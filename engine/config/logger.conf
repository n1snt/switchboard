;
; Logging configuration for the SIP trace (implementation.md feature 23). The
; control plane reads a call's SIP ladder by tailing Asterisk's PJSIP message
; log from the shared log volume (docker-compose.yml mounts switchboard-pjsip-log
; at /var/log/asterisk on both the engine and the API), parsing the
; `<--- Received/Transmitting SIP ... --->` frames PJSIP emits when its logger is
; on (enabled at start by docker-entrypoint.sh).
;
; The `messages` file therefore has to carry those frames. They arrive on the
; verbose channel, so it is included alongside the usual levels; the parser
; (apps/server/src/modules/calls/sip-trace-parser.ts) ignores everything that is
; not a SIP frame, so the extra log noise is harmless. The exact channel a given
; Asterisk build routes PJSIP frames to is version-dependent and is confirmed
; against the running engine (CLAUDE.md: media/signaling paths are proven by a
; real call, not a unit test).

[general]

[logfiles]
messages => notice,warning,error,verbose
