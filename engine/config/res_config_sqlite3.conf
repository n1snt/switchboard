;
; The res_config_sqlite3 realtime engine: one named database, pointed at the
; SAME SQLite file switchboard-api reads and writes (Decision D2, one file;
; implementation.md feature 11). docker-compose.yml mounts the
; switchboard-db-data named volume — also mounted at /app/data on
; switchboard-api — into this container at /var/lib/switchboard/db, so
; "switchboard.sqlite" below is the identical file on disk as
; /app/data/switchboard.sqlite on switchboard-api. See
; documentation/dev/engine-provisioning.md for the full path-mapping
; write-up, including the shared-volume permission trade-off (this directory
; is deliberately world-writable; see the mkdir/chmod in engine/Dockerfile).
;
; Not templated (no envsubst): the mount path is an engine-internal container
; path with no environment-dependent value, unlike the RTP range or the
; advertised address.
;
; requirements=warn (not the res_config_sqlite3 default of createclose):
; Asterisk is a pure reader of ps_endpoints/ps_auths/ps_aors in this design —
; only switchboard-api's Kysely migrations ever change table structure, and
; only its repository layer ever writes rows. "warn" only logs when an
; expected column is missing on a read; it never attempts to alter the
; control plane's tables itself, which "createclose"/"createchar" would.

[switchboard]
dbfile => /var/lib/switchboard/db/switchboard.sqlite
requirements = warn
