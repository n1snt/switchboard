;
; Maps each realtime family (the table names sorcery.conf's "realtime,<table>"
; mappings reference) to a database driver, database name, and table. Format
; is `family => driver,dbname[,table[,priority]]`; when the table argument is
; omitted (as below) the family name doubles as the table name, which is
; exactly what we want since ps_endpoints/ps_auths/ps_aors are both the
; sorcery family name and the actual table name the control plane's Kysely
; migration creates (implementation.md feature 11).
;
; "sqlite3" is the driver res_config_sqlite3.so registers itself under.
; "switchboard" is the [switchboard] section name in
; config/res_config_sqlite3.conf, which is where the actual dbfile path
; lives — see that file and documentation/dev/engine-provisioning.md.
;
; Reference: https://docs.asterisk.org/Configuration/Core-Configuration/Realtime-Database-Configuration/

[settings]
ps_endpoints => sqlite3,switchboard
ps_auths => sqlite3,switchboard
ps_aors => sqlite3,switchboard
; See the "identify" note in sorcery.conf: mapped ahead of a table actually
; existing on purpose (harmless "no such table" logging until a follow-up
; feature adds it) so auth_mode "ip" enforcement is a config-only change away.
ps_endpoint_id_ips => sqlite3,switchboard
