;
; Stasis-first dialplan. Every call — from a browser softphone endpoint
; (feature 9) or from a provisioned trunk (feature 10/11) — is hooked into
; the `switchboard` Stasis application (the ARI app the control plane owns,
; SWITCHBOARD_ARI_APP in apps/server/src/config.ts) and nothing else — no
; Dial() here. The control plane reads the dialed extension off the
; caller's channel (`channel.dialplan.exten`) when it receives StasisStart
; and does all further routing itself: matching a route to the softphone for
; a trunk call (feature 15/16, apps/server/src/ari/coordinator.ts) or
; originating the callee leg back into Stasis for a browser-to-browser call.
; This file has no static routing logic because there is none to have:
; everything past "enter Stasis" is the control plane's job. Feature 17
; (the softphone dialing out through a trunk) needs no dialplan at all: the
; control plane originates the trunk leg over ARI directly into the Stasis
; app, bypassing the dialplan entirely — see
; documentation/dev/engine-provisioning.md.
;
; Two contexts, kept separate even though both just call Stasis(switchboard):
; a PJSIP endpoint is pointed at exactly one context by name (context= in
; pjsip.conf.template for the two static webrtc endpoints; the
; ps_endpoints.context realtime column for a provisioned trunk — see
; engine-provisioning.md), and Asterisk only resolves an extension within the
; calling channel's own context, so a browser endpoint can never reach a
; trunk-context extension (or vice versa) by coincidentally dialing a
; matching number.
;
; This file is not templated (no envsubst) since it has no environment-
; dependent values, unlike pjsip.conf.template/rtp.conf.template/
; ari.conf.template.

[switchboard-webrtc]
; _10XX matches any 4-digit extension starting with 10 (1000-1099), which
; covers both browser endpoints (1001, 1002) from pjsip.conf.template and
; leaves room to add more without a dialplan change.
exten => _10XX,1,NoOp(Switchboard: routing ${EXTEN} into Stasis(switchboard))
 same => n,Stasis(switchboard)
 same => n,Hangup()

[switchboard-trunk]
; A provisioned trunk's ps_endpoints row (implementation.md feature 11) sets
; context = switchboard-trunk, so any inbound call arriving on it — for
; whatever number the system-under-test dialed — enters Stasis. The actual
; dialed number is only meaningful to the control plane's route-matching
; (feature 15/16) and is never pattern-matched beyond "is it a number" here.
;
; _X. (one or more characters, starting with a digit) is the catch-all,
; deliberately NOT Asterisk's true wildcard `_.`: Asterisk itself logs a
; startup warning that `_.` is "strongly discouraged" and "can have
; unexpected behavior" (confirmed while verifying this file — it can match
; before every expected digit has arrived, since dialplan patterns are
; evaluated as digits come in). The one thing `_.` would have bought over
; `_X.` is matching a leading `+`, which is how E.164 numbers such as
; +14155550123 arrive in a Request-URI user part — handled explicitly
; instead by the entry below, which strips the `+` and re-enters at _X.
exten => _+X.,1,Goto(${EXTEN:1},1)

exten => _X.,1,NoOp(Switchboard: routing trunk call for ${EXTEN} into Stasis(switchboard))
 same => n,Stasis(switchboard)
 same => n,Hangup()
