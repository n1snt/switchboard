;
; Stasis-first dialplan. Every browser-endpoint call is hooked into the
; `switchboard` Stasis application (the ARI app the control plane owns,
; SWITCHBOARD_ARI_APP in apps/server/src/config.ts) and nothing else — no
; Dial() here. The control plane reads the dialed extension off the
; caller's channel (`channel.dialplan.exten`) when it receives StasisStart
; and originates the callee leg itself, back into the same Stasis app (see
; apps/server/src/ari/coordinator.ts). This file has no static routing logic
; because there is none to have: everything past "enter Stasis" is the
; control plane's job.
;
; This file is not templated (no envsubst) since it has no environment-
; dependent values, unlike pjsip.conf.template/rtp.conf.template/
; ari.conf.template.

[switchboard-webrtc]
; _10XX matches any 4-digit extension starting with 10 (1000-1099), which
; covers both browser endpoints (1001, 1002) from pjsip.conf.template and
; leaves room to add more without a dialplan change.
exten => _10XX,1,NoOp(Switchboard: routing ${EXTEN} into Stasis(switchboard))
 same => n,Stasis(switchboard)
 same => n,Hangup()
