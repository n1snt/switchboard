;
; Asterisk's built-in HTTP server. Two things ride on this single port: the
; ARI REST interface (used only by switchboard-api, over the Docker network)
; and the WebSocket upgrade the browser softphone signals SIP over (SIP.js,
; used directly by the browser — see architecture.md's container diagram).
; Both are enabled by loading res_http_websocket and res_ari alongside this.

[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088

; Plain ws:// is enough for the walking skeleton: every browser treats
; http(s)://localhost as a secure context, so getUserMedia/WebRTC work
; without TLS on the signaling channel, and DTLS-SRTP (configured per
; endpoint in pjsip.conf.template) still encrypts the audio itself. This is
; the localhost-only trade-off documented in
; documentation/dev/containers.md; do not carry it past localhost.
;
; To enable wss:// for non-localhost use, mount a certificate and key and
; uncomment:
; tlsenable = yes
; tlsbindaddr = 0.0.0.0:8089
; tlscertfile = /etc/asterisk/keys/wss-cert.pem
; tlsprivatekey = /etc/asterisk/keys/wss-key.pem
