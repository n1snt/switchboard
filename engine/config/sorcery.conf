;
; Sorcery Data Access Layer object-type mappings (implementation.md feature 11,
; Decision D1: PJSIP Realtime). Sorcery is the generic persistence layer PJSIP
; (and other Asterisk subsystems) use for its configuration objects. Without
; this file, res_pjsip falls back to its built-in default of a "config"
; wizard against pjsip.conf only, for every object type — which is exactly
; what the two static webrtc endpoints (1001/1002, pjsip.conf.template, from
; the feature 9 walking skeleton) still need to keep working unchanged.
;
; Each object type below is mapped to TWO wizards, consulted in the order
; listed (this is documented sorcery.conf behavior: "each mapping will be
; consulted in the order in which it appears"):
;
;   1. config,pjsip.conf,criteria=type=<type> — the existing static file, so
;      the two webrtc endpoints from feature 9 are found first and keep
;      working exactly as before this feature.
;   2. realtime,<table> — extconfig.conf's mapping of that table name to the
;      res_config_sqlite3 engine (config/res_config_sqlite3.conf), which is
;      how the control plane's ps_endpoints/ps_auths/ps_aors rows
;      (implementation.md feature 10/11) show up as live PJSIP objects with
;      no config reload needed when a trunk is created, edited, or deleted.
;
; This "config wizard first, realtime wizard second, for the same object
; type" shape is the standard, documented pattern for mixing static-file
; PJSIP objects with database-provisioned ones — it is not something specific
; to Switchboard. Static config always wins on an id collision (it is listed
; first and sorcery's retrieve-by-id stops at the first match); in practice
; this never matters here because trunk ids are always the shared package's
; "trunk_"-prefixed nanoid identifiers (packages/shared/src/schemas/trunk.ts),
; so they can never collide with the four-digit "1001"/"1002" webrtc endpoint
; ids declared in pjsip.conf.template.
;
; See documentation/dev/engine-provisioning.md for the full write-up: the
; shared-SQLite-file path mapping, the exact realtime table/column
; assumptions, and how a provisioned trunk's endpoint reaches the right
; dialplan context.

[res_pjsip]
endpoint = config,pjsip.conf,criteria=type=endpoint
endpoint = realtime,ps_endpoints
auth = config,pjsip.conf,criteria=type=auth
auth = realtime,ps_auths
aor = config,pjsip.conf,criteria=type=aor
aor = realtime,ps_aors

; "identify" objects let an inbound INVITE that does not otherwise match an
; endpoint (no matching username, no matching Contact) be matched purely by
; the source IP address of the sender (res_pjsip_endpoint_identifier_ip) —
; this is how a trunk's auth_mode "ip" (data-model.md) is enforced at the SIP
; layer so an inbound call from a fixed-IP peer is attributed to the right
; trunk (implementation.md feature 16). The control plane provisions a
; ps_endpoint_id_ips row per "ip"-mode trunk from its allowed_ips
; (apps/server/src/modules/trunks/realtime-provisioner.ts, migration
; 0003_pjsip_identify); digest trunks match by username and need no identify
; row.
[res_pjsip_endpoint_identifier_ip]
identify = config,pjsip.conf,criteria=type=identify
identify = realtime,ps_endpoint_id_ips
