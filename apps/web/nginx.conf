#
# Serves the built dashboard/softphone SPA and reverse-proxies the control
# plane so the browser stays single-origin (documentation/dev/architecture.md,
# component 3): no CORS configuration needed anywhere, and the dashboard,
# REST API, OpenAPI document, Swagger UI, and event stream all live under one
# origin from the browser's point of view.
#
# NOT proxied here: the browser softphone's own SIP signaling WebSocket. That
# connects directly to switchboard-engine's ws:// port (see
# docker-compose.yml and documentation/dev/containers.md) — a second,
# independent origin the browser talks to for audio only.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # WebSocket upgrade handling for /api/v1/events (the call-event stream,
  # feature 8). Falls back to "close" for plain requests so the same
  # location block serves both the initial WS handshake and would-be plain
  # HTTP requests to the same path without error.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container healthcheck target: cheap, does not depend on the SPA's
    # index.html or the API being reachable.
    location = /healthz {
      default_type text/plain;
      return 200 'ok';
    }

    # The event stream must be matched before the generic /api location so
    # its Upgrade/Connection headers apply; a plain proxy_pass without them
    # would fail the WebSocket handshake with a 400.
    location /api/v1/events {
      proxy_pass http://switchboard-api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      # Long-lived stream, not a slow backend: without this nginx's default
      # read timeout would silently drop idle-but-open event connections.
      proxy_read_timeout 3600s;
    }

    # REST API, the OpenAPI document, and Swagger UI (all under /api).
    location /api {
      proxy_pass http://switchboard-api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app: any route TanStack Router owns client-side (e.g.
    # /trunks, /calls/abc123) falls through to index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
